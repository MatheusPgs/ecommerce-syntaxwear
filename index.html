<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="SyntaxWear - Sua loja online de tênis e sneakers. Encontre os melhores modelos para homens e mulheres, com ofertas exclusivas e frete grátis. Compre agora!" />
  <title>SyntaxWear - Tênis e Sneakers Online</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/components/header.css" />
  <link rel="stylesheet" href="./css/components/hero.css" />
  <link rel="stylesheet" href="./css/components/product-card.css" />

</head>


<body>
  <!-- Header com logo e navegação -->
  <header class="header">
    <h1 class="logo">
      <a href="/" title="SyntaxWear - Tênis e Sneakers Online">
        <img src="./images/logo/logo.svg" alt="SyntaxWear - Tênis e Sneakers Online">
      </a>
    </h1>

    <nav class="nav-center" aria-label="Categorias Principais">
      <ul>
        <li><a href="#">Masculino</a></li>
        <li><a href="#">Feminino</a></li>
        <li><a href="#">Outlet</a></li>
      </ul>
    </nav>

    <nav class="nav-right" aria-label="Menu Secundário">
      <ul>
        <li><a href="#">Nossas lojas</a></li>
        <li><a href="#">Sobre</a></li>
        <li><a href="#" aria-label="Minha Conta"> <img src="./images/icons/user.svg" alt="Minha Conta"> </a></li>
        <li><a href="#" aria-label="Ajuda"> <img src="./images/icons/help.svg" alt="Ajuda"> </a></li>
        <li><a href="#" aria-label="Carrinho"> <img src="./images/icons/carrinho.svg" alt="Carrinho"> </a></li>
      </ul>
    </nav>
  </header>

  <!-- Seção principal -->
  <main>
    <!-- Seção Hero -->
    <section class="hero">
      <!-- Conteúdo hero -->
      <div class="hero-overlay">
        <div class="hero-content">
          <span class="hero-subtitle">Krypton One</span>
          <h2 class="hero-title">Transforme qualquer passo em presença.</h2>

          <div class="hero-buttons">
            <a class="btn btn-outline" href="#">Ver modelos</a>
            <a class="btn btn-filled" href="#">Comprar</a>
          </div>
        </div>
      </div>
    </section>

    <!-- Seção de Categorias de Tênis -->
    <section class="categories">
      <!-- Categorias -->

      <div class="category-card casual">
        <a href="#">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Casual</span>
        </a>
      </div>

      <div class="category-card esporte">
        <a href="#">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Esporte</span>
        </a>
      </div>

      <div class="category-card moderno">
        <a href="#">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Moderno</span>
        </a>
      </div>

      <div class="category-card futurista">
        <a href="#">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Futurista</span>
        </a>
      </div>

    </section>

    <!-- Seção de Produtos em Destaque -->
    <section class="featured-products">
      <div class="products-grid">
        <!-- Produtos -->
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <!-- Informações de contato e links -->
  </footer>
</body>

</html>
